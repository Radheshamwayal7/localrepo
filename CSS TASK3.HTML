<!DOCTYPE html>
<html>
    <head>
        <title>CSS Task 3</title>
        <style type="text/css" rel="stylesheet">
            .main{
                width:1000px;
                height:1000px;
                background-image:url(https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Ch%C3%A2teau_de_Maisons-Laffitte_001.jpg/500px-Ch%C3%A2teau_de_Maisons-Laffitte_001.jpg);
                color:blue;
                border:2px solid black;
                background-position: top center;
                background-repeat: no-repeat;
                background-size: cover;
                background-attachment: fixed;
                font-size: 30px;
            }
            .main2{
                width:1000px;
                height:1000px;
                background-color:yellow;
                color:blue;
                border:2px solid black;

            }
        </style>
    </head>
    <body>
        <div class="main">
            <p>Background image is fixed and will not move when you scroll the page.</p>
        </div>
        <div class="main2"></div>
    </body>
</html>
