<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myntra CLone</title>
    <link type="TEXT/CSS" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        *{
            margin: 0%;
            padding: 0%;
            font-family: sans-serif;
        }
        .header{
            width: 100%;
            height: 100px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }
        .Leftheader img{
            width: 60px;
            height: 50px;
            padding-top: 20px;
            margin-left: 25px;
            display: flex;
            margin-right: 20px;
        }
        p{
          display: flex;
          align-items: center;
          word-spacing: 20px;
          font-size: large;
          font-weight: bold;
        }
        b{
            padding-top: 30px;

        }
        .Rightheader{
            width: fit-content;
            display: flex;
            justify-content: center;
            padding-right: 20px;
        }
        .Rightheader form{
            display: flex;
            align-items: center;
            margin-left: 20px;
        }
        .Rightheader form i{
            margin-right: 5px;
        }
        .Rightheader form input{
            width:350px ;
            height: 30px;
        }
        .userprofile{
            width: 10px;
            height: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
            margin-left: 60px;
            padding: 0%;
            margin-bottom: 5px;
        }
        .userprofile span{
            text-align: center;
            justify-content: center;
            
        }
        .userprofile span{
            margin: 0%;
        }
        .userprofile i{
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            justify-content: center;
            
        }
        .wishlist{
             width: 10px;
            height: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
            margin-left: 60px;
            padding: 0%;
        }
        .wishlist i{
            padding-bottom: 10px;
        }
        .bag{
            width: fit-content;
            height: fit-content;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 32px;
            margin-left: 50px;
            margin-right: 30px;

        }
        .bag span{
            margin-top: 10px;
        }

        .firstorder{
            width: 80%;
            height: 100px;
            margin: auto;
            background-color: red;
            display: flex;
        }
        .firstorder span{
            margin: auto;
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="Leftheader">
            <img src="Myntra.png" width="50px" height="20px">
        </div>
        <p> 
            Men
            Women
            Kids
            Home
            Beauty
            Genz
            Studio
        </p>
        <div class="Rightheader">
            <form>
                    <i class="fa-solid fa-magnifying-glass"></i> 
               <input type="text" placeholder="       Search For Product,Brands and more">
            </form>
            <div class="userprofile">
                <i class="fa-solid fa-user"></i>
                <span>Profile</span>
            </div>
            <div class="wishlist">
                <i class="fa-solid fa-heart"> </i>
                <span>Wishlist</span>
            </div>
            <div class="bag">
                <i class="fa-solid fa-bag-shopping"></i>
                <span>Bag</span>
            </div>
        </div>
    </div>
    <div class="firstorder">
        <span>FLAT 300 OFF</span>
        <span>ON FIRST PURCHASE</span>
    </div>
</body>
</html>
