<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="TEXT/css">
        .main{
            width: 500px;
            height: 600px;
            margin: auto;
            margin-top: 100px;
            background: greenyellow;
        }
        p{
            text-align: center;
            color: purple;
            font-size: x-large;
            padding: 20px 40px ;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 10px 10px 5px red;
        }
        .main p{
            padding: 50px 50px;
            color: rgb(193, 82, 100);
        }
        .main p:nth-child(2){
            color: rgb(47, 13, 138);
        }
        .main p:nth-child(4){
            color: bisque;
        }
        .main:hover{
            background: black;
        }
    </style>
</head>
<body>
    <div class="main">
        <p>HII</p>
        <p>BYY</p>
        <p>CUTE</p>
        <p>BOOM</p>
    </div>
    <P>CRAZYYY Bhai</P>
</body>
</html>
