<!DOCTYPE html>
<HTML>
    <head>
        <title>Task1 CSS</title>
        <style type="text/css">
            .main{
                width: 900px;
                height: 100px;
                background-color: aqua;
                text-align: center;
                word-spacing: 10px;
                letter-spacing: 5px;
                text-decoration: line-through;
                text-transform: capitalize;
                font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
                font-size: large;
                
            }
            .row1{
                width: 900px;
                height: 50px;
                background-color: bisque;
                
            }
            .row1c1{
                width: 200px;
                height: 50px;
                background-color: brown;
                float: left;
            }
            .row1c2{
                width: 300px;
                height: 50px;
                background-color: rgb(38, 94, 129);
                float: left;
            }
            .row1c3{
                width: 400px;
                height: 50px;
                background-color: rgb(146, 180, 25);
                float: left;
            }
            .row2{
                width: 900px;
                height: 100px;
                background-color: cyan;
            }
            .row3{
                width: 900px;
                height: 50px;
                background-color: aliceblue;
            }
            .row3c1{
                width: 400px;
                height: 50px;
                background-color: yellow;
                float: left;
            }
            .row3c2{
                width: 500px;
                height: 50px;
                background-color: pink;
                float: right;
            }
        </style>
    </head>
    <body>
        <div class="main">
            <div class="row1">
                <div class="row1c1">Home</div>
                <div class="row1c2">About</div>
                <div class="row1c3">Course</div>
            </div>
            <div class="row2">Welcome To Ws</div>
            <div class="row3">
                <div class="row3c1">Img</div>
                <div class="row3c2">Content</div>
            </div>
        </div>
    </body>
</HTML>
